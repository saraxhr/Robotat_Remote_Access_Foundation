# Defines the MQTT listener port and uses a placeholder broker IP address.
listener 1880 <MQTT_BROKER_IP>

# Allows anonymous access only for local testing inside a controlled lab network.
allow_anonymous true

# Enables Mosquitto persistence so retained/session data can be stored if needed.
persistence true

# Defines a placeholder directory where Mosquitto can store persistence data.
persistence_location <MOSQUITTO_DATA_PATH>

# Defines an optional placeholder log file path for Mosquitto logs.
# log_dest file <MOSQUITTO_LOG_PATH>

# Enables general logging if needed during local testing.
# log_type all
